services:
  - type: web
    name: feishu-ecn-bom-mail-automation
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SAFE_TEST_MODE
        value: "true"
      - key: EMAIL_DRY_RUN
        value: "true"
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_VERIFICATION_TOKEN
        sync: false
      - key: FEISHU_SENDER_MAILBOX_ID
        sync: false
      - key: FEISHU_SENDER_DISPLAY_NAME
        value: BOM释放通知
      - key: FEISHU_USER_TOKEN_B64
        sync: false
      - key: FEISHU_SYNC_CHAT_ID
        sync: false
      - key: FIXED_RECIPIENTS
        sync: false
      - key: TEST_RECIPIENTS
        sync: false
      - key: BITABLE_APP_TOKEN
        sync: false
      - key: BITABLE_TABLE_ID
        sync: false
      - key: BITABLE_SOURCES
        sync: false
      - key: BITABLE_SKIP_EXISTING_ON_START
        value: "false"
