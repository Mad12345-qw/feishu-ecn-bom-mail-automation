services:
  - type: web
    name: feishu-ecn-bom-mail-automation
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SAFE_TEST_MODE
        value: "true"
      - key: EMAIL_DRY_RUN
        value: "true"
      - key: INCLUDE_FACTORY_RECIPIENTS
        value: "false"
      - key: FACTORY_RECIPIENTS
        sync: false
      - key: CONTACT_EMAIL_MAP
        sync: false
      - key: RECIPIENT_CONFIG_BITABLE
        sync: false
      - key: INCLUDE_DYNAMIC_RECIPIENTS
        value: "true"
      - key: READY_STATUS_VALUES
        value: 已通过,审批通过,完成,已完成,已发布
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_VERIFICATION_TOKEN
        sync: false
      - key: FEISHU_SENDER_MAILBOX_ID
        sync: false
      - key: FEISHU_SENDER_DISPLAY_NAME
        value: BOM释放通知
      - key: FEISHU_USER_TOKEN_B64
        sync: false
      - key: FEISHU_SYNC_CHAT_ID
        sync: false
      - key: FEISHU_BOM_APPROVAL_CODES
        sync: false
      - key: FEISHU_BOM_APPROVAL_NAMES
        value: BOM释放审批
      - key: APPROVAL_SYNC_LOOKBACK_MINUTES
        value: "30"
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: UPSTASH_FEISHU_USER_TOKEN_KEY
        value: feishu:user-token
      - key: FIXED_RECIPIENTS
        sync: false
      - key: TEST_RECIPIENTS
        sync: false
      - key: BITABLE_APP_TOKEN
        sync: false
      - key: BITABLE_TABLE_ID
        sync: false
      - key: BITABLE_SOURCES
        sync: false
      - key: BITABLE_TRIGGER_SOURCE_NAMES
        value: 正式表1
      - key: BITABLE_LOOKUP_SOURCE_NAMES
        value: 正式表2
      - key: BITABLE_SKIP_EXISTING_ON_START
        value: "true"
